name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run tsc --noEmit

      - name: Verify bin entry loads
        run: |
          # Should fail with config error (missing token), not a module error
          output=$(bun run bin/ccbot-ts.ts 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "TELEGRAM_BOT_TOKEN" && echo "✅ bin entry OK" || (echo "❌ unexpected error" && exit 1)
